[project]
name = "planning_agent"
version = "0.1.0"
description = "Planning Agent Project"
requires-python = ">=3.9"
dependencies = [
    "pytest>=8.3.5",
    "pyyaml>=6.0.2",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v"

[tool.hatch.build.targets.wheel]
packages = ["planning_agent"] 
